services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: microcrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      target: backend
    environment:
      DB_HOST: db
      DB_NAME: microcrm
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"