name: 03 - Continuous Deployment

on:
  workflow_call:
  push:
    branches: [ main ]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Déploiement via Azure CLI (C25.1)
      - name: Deploy Backend with Azure CLI
        run: |
          az webapp config container set \
            --name ${{ secrets.AZURE_WEBAPP_NAME_BACK }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ghcr.io/${{ github.repository }}/backend:${{ github.sha }} \
            --docker-registry-server-url https://ghcr.io \
            --docker-registry-server-user ${{ github.actor }} \
            --docker-registry-server-password ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Frontend with Azure CLI
        run: |
          az webapp config container set \
            --name ${{ secrets.AZURE_WEBAPP_NAME_FRONT }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}