name: CI/CD Pipeline Orion DevSecOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests-and-quality:
    runs-on: ubuntu-latest
    # --- FIX CODEQL PERMISSIONS (C25.2) ---
    permissions:
      actions: read
      contents: read
      security-events: write 
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: microcrm
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend Tests
        run: cd back && ./gradlew test
        env:
          DB_HOST: localhost
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Frontend Tests
        run: |
          cd front
          npm ci
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-and-push:
    needs: tests-and-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- BUILD DES DEUX IMAGES (C21, C23) ---
      - name: Build Backend and Frontend Images
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} --target backend .
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} --target frontend .
          
          # Tags "latest" pour faciliter le déploiement
          docker tag ghcr.io/${{ github.repository }}/backend:${{ github.sha }} ghcr.io/${{ github.repository }}/backend:latest
          docker tag ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ghcr.io/${{ github.repository }}/frontend:latest

      # --- SCANS DE SÉCURITÉ (C25.2) ---
      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/backend:${{ github.sha }}'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # --- PUSH DES IMAGES (C25.1) ---
      - name: Push all images to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/backend:latest
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/frontend:latest

  deploy-azure:
    # Déploiement réel uniquement sur la branche main (C25.1)
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_BACK }}
          images: 'ghcr.io/${{ github.repository }}/backend:${{ github.sha }}'