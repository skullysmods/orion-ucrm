name: CI/CD Pipeline Orion DevSecOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript

      # Tests Backend
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Backend Tests
        run: cd back && ./gradlew test

      # Tests Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Frontend Tests
        run: |
          cd front
          npm ci
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-push-deploy:
    needs: security-and-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Tag avec SHA pour traçabilité
      - name: Build and Scan Images
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} --target backend .
          docker build -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} --target frontend .

      # Scan de sécurité bloquant (Trivy)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/backend:${{ github.sha }}'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

      # Note : Cette étape simule la création du secret dans le cluster sans fichier YAML physique
      - name: Create K8s Secret from GitHub Secrets
        run: |
          echo "kubectl create secret generic db-secrets \
            --from-literal=username=${{ secrets.DB_USER }} \
            --from-literal=password=${{ secrets.DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -"