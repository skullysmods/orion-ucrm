name: CI/CD Pipeline Orion uCRM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Analyse statique (SAST)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript

      # Tests Backend
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Backend Tests
        run: cd back && ./gradlew test

      # Tests Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Frontend Tests
        run: |
          cd front
          npm ci
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-and-push:
    needs: tests-and-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build et Scan de sécurité (Trivy)
      - name: Build Backend Image
        run: docker build -t ghcr.io/${{ github.repository }}/backend:latest --target backend .

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/backend:latest'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Bloque le pipeline si vulnérabilités

      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository }}/backend:latest