name: CI/CD Pipeline Orion DevSecOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests-and-quality:
    runs-on: ubuntu-latest
    services:
      # Service de base de données pour les tests d'intégration (C22)
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: microcrm
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Analyse de code statique (SAST - C22)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript

      # Setup environnements pour les tests
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Exécution des tests (C22)
      - name: Frontend Tests
        run: |
          cd front
          npm ci
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Backend Tests
        run: cd back && ./gradlew test
        env:
          DB_HOST: localhost
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-and-push:
    needs: tests-and-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build avec traçabilité par SHA (C21)
      - name: Build Backend Image
        run: docker build -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} --target backend .

      # Scan de sécurité bloquant (C25)
      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/backend:${{ github.sha }}'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}/backend:${{ github.sha }} ghcr.io/${{ github.repository }}/backend:latest
          docker push ghcr.io/${{ github.repository }}/backend:latest

  deploy-to-azure:
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Déploiement Cloud automatisé (C25)
      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_BACK }}
          images: 'ghcr.io/${{ github.repository }}/backend:${{ github.sha }}'

      # Orchestration et Scaling (C24)
      - name: Scale Web App (Example of resource management)
        run: az webapp config plan update --name MyPlan --resource-group MyRG --sku P1V2