name: Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/02-1_DockerBuild.yml
    secrets: inherit
  trivy:
    needs: build
    uses: ./.github/workflows/02-2_TrivyScan.yml
    secrets: inherit
  deploy:
    needs: trivy
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/02-3_DeployAKS.yml
    secrets: inherit