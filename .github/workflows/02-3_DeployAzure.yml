name: 02-3 - Azure CLI Deploy

on:
  workflow_call:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy Backend
        run: |
          az webapp config container set --name ${{ secrets.AZURE_WEBAPP_NAME_BACK }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --docker-custom-image-name ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - name: Deploy Frontend
        run: |
          az webapp config container set --name ${{ secrets.AZURE_WEBAPP_NAME_FRONT }} \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --docker-custom-image-name ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}